# GitHub Auto-generated Release Notes configuration
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog
      - dependencies
      - chore
    authors:
      - github-actions
      - dependabot

  categories:
    - title: "✨ New Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
        - bugfix
    - title: "🔒 Security"
      labels:
        - security
    - title: "⚡ Performance"
      labels:
        - performance
    - title: "🌐 Internationalization"
      labels:
        - i18n
    - title: "🔌 Plugin System"
      labels:
        - plugin
    - title: "📖 Documentation"
      labels:
        - documentation
        - docs
    - title: "🏗️ Other Changes"
      labels:
        - "*"
